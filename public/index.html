<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>test-manager items</title>
  <style>
    body { font-family: sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; color: #222; }
    h1 { margin-bottom: .2rem; }
    .sub { color: #777; margin-top: 0; }
    form { display: flex; gap: .5rem; margin: 1rem 0; }
    input { flex: 1; padding: .45rem .6rem; border: 1px solid #bbb; border-radius: 4px; }
    button { padding: .45rem .8rem; border: 1px solid #888; border-radius: 4px; background: #f5f5f5; cursor: pointer; }
    button:hover { background: #e8e8e8; }
    button.danger { border-color: #c66; color: #a00; }
    button:disabled { opacity: .45; cursor: default; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: .45rem .5rem; border-bottom: 1px solid #ddd; font-size: .95rem; }
    th { background: #fafafa; }
    th.sortable { cursor: pointer; user-select: none; }
    td.actions { white-space: nowrap; }
    td.actions button { margin-right: .3rem; }
    #message { min-height: 1.2em; }
    #message.error, #login-message { color: #a00; }
    #message.info { color: #777; }
    #empty { color: #777; }
    .top { display: flex; justify-content: space-between; align-items: baseline; }
    .toolbar { margin: 1rem 0; display: flex; }
    .pager { display: flex; gap: .6rem; align-items: center; margin: 1rem 0; color: #555; }
    #login-view { max-width: 360px; margin: 3rem auto 0; }
    #login-view form { flex-direction: column; }
  </style>
</head>
<body>
  <div class="top">
    <div>
      <h1>test-manager items</h1>
      <p class="sub">web BE → db-service → PostgreSQL 경유 items 관리</p>
    </div>
    <button id="logout" hidden>로그아웃</button>
  </div>

  <div id="login-view" hidden>
    <form id="login-form">
      <input id="login-user" placeholder="사용자명" autocomplete="username" required>
      <input id="login-pass" type="password" placeholder="비밀번호" autocomplete="current-password" required>
      <button type="submit">로그인</button>
    </form>
    <p id="login-message"></p>
  </div>

  <div id="app-view" hidden>
    <form id="add-form">
      <input id="new-name" placeholder="새 item 이름" required>
      <button type="submit">추가</button>
      <button type="button" id="refresh">새로고침</button>
    </form>
    <div class="toolbar">
      <input id="search" placeholder="이름 검색 (부분일치)">
    </div>
    <p id="message"></p>

    <table id="items-table" hidden>
      <thead>
        <tr>
          <th class="sortable" data-sort="id" data-label="ID">ID</th>
          <th class="sortable" data-sort="name" data-label="이름">이름</th>
          <th class="sortable" data-sort="created_at" data-label="생성">생성</th>
          <th class="sortable" data-sort="updated_at" data-label="수정">수정</th>
          <th>동작</th>
        </tr>
      </thead>
      <tbody id="items"></tbody>
    </table>
    <p id="empty" hidden>등록된 item이 없습니다.</p>

    <div class="pager">
      <button id="prev">이전</button>
      <span id="page-info"></span>
      <button id="next">다음</button>
    </div>
  </div>

  <script>
    // BE 포트는 FE 서버가 환경별로 주입 (prod 55558 / dev 45558)
    const API = `http://${location.hostname}:__BE_PORT__`;
    const $login = document.getElementById('login-view');
    const $app = document.getElementById('app-view');
    const $logout = document.getElementById('logout');
    const $loginMsg = document.getElementById('login-message');
    const $items = document.getElementById('items');
    const $table = document.getElementById('items-table');
    const $empty = document.getElementById('empty');
    const $message = document.getElementById('message');
    const $search = document.getElementById('search');
    const $prev = document.getElementById('prev');
    const $next = document.getElementById('next');
    const $pageInfo = document.getElementById('page-info');

    // 목록 조회 상태 (검색/정렬 변경 시 offset 은 0 으로 리셋)
    const state = { q: '', limit: 20, offset: 0, sort: 'id', order: 'asc', total: 0 };

    function say(text, kind) {
      $message.textContent = text;
      $message.className = kind || '';
    }

    function showLogin() {
      $login.hidden = false; $app.hidden = true; $logout.hidden = true;
    }
    function showApp() {
      $login.hidden = true; $app.hidden = false; $logout.hidden = false;
      refresh();
    }

    async function api(path, opts) {
      const res = await fetch(API + path, {
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        ...opts,
      });
      if (res.status === 401) { showLogin(); throw new Error('로그인이 필요합니다'); }
      if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
      return res.json();
    }

    function fmt(ts) {
      return ts ? new Date(ts).toLocaleString('ko-KR') : '-';
    }

    function viewRow(item) {
      const tr = document.createElement('tr');

      const tdId = document.createElement('td');
      tdId.textContent = item.id;
      const tdName = document.createElement('td');
      tdName.textContent = item.name;
      const tdCreated = document.createElement('td');
      tdCreated.textContent = fmt(item.created_at);
      const tdUpdated = document.createElement('td');
      tdUpdated.textContent = fmt(item.updated_at);

      const tdActions = document.createElement('td');
      tdActions.className = 'actions';
      const edit = document.createElement('button');
      edit.textContent = '수정';
      edit.onclick = () => {
        const row = editRow(item);
        tr.replaceWith(row);
        row.querySelector('input').focus();
      };
      const del = document.createElement('button');
      del.textContent = '삭제';
      del.className = 'danger';
      del.onclick = async () => {
        if (!confirm(`#${item.id} "${item.name}" 을(를) 삭제할까요?`)) return;
        try { await api(`/items/${item.id}`, { method: 'DELETE' }); refresh(); }
        catch (e) { say('삭제 실패: ' + e.message, 'error'); }
      };
      tdActions.append(edit, del);

      tr.append(tdId, tdName, tdCreated, tdUpdated, tdActions);
      return tr;
    }

    function editRow(item) {
      const tr = document.createElement('tr');

      const tdId = document.createElement('td');
      tdId.textContent = item.id;
      const tdName = document.createElement('td');
      const input = document.createElement('input');
      input.value = item.name;
      tdName.append(input);
      const tdCreated = document.createElement('td');
      tdCreated.textContent = fmt(item.created_at);
      const tdUpdated = document.createElement('td');
      tdUpdated.textContent = fmt(item.updated_at);

      const tdActions = document.createElement('td');
      tdActions.className = 'actions';
      const save = document.createElement('button');
      save.textContent = '저장';
      save.onclick = async () => {
        const name = input.value.trim();
        if (!name) { say('이름을 입력하세요', 'error'); return; }
        try {
          await api(`/items/${item.id}`, { method: 'PUT', body: JSON.stringify({ name }) });
          refresh();
        } catch (e) { say('수정 실패: ' + e.message, 'error'); }
      };
      const cancel = document.createElement('button');
      cancel.textContent = '취소';
      cancel.onclick = () => tr.replaceWith(viewRow(item));
      tdActions.append(save, cancel);

      tr.append(tdId, tdName, tdCreated, tdUpdated, tdActions);
      return tr;
    }

    function renderPager(count) {
      const from = state.total === 0 ? 0 : state.offset + 1;
      const to = state.offset + count;
      $pageInfo.textContent = `${from}–${to} / 총 ${state.total}건`;
      $prev.disabled = state.offset === 0;
      $next.disabled = state.offset + state.limit >= state.total;
    }

    function renderSortMarks() {
      document.querySelectorAll('th.sortable').forEach((th) => {
        const label = th.dataset.label;
        th.textContent = th.dataset.sort === state.sort
          ? `${label} ${state.order === 'asc' ? '▲' : '▼'}`
          : label;
      });
    }

    async function refresh() {
      say('불러오는 중…', 'info');
      try {
        const params = new URLSearchParams({
          limit: state.limit, offset: state.offset, sort: state.sort, order: state.order,
        });
        if (state.q) params.set('q', state.q);
        const data = await api('/items?' + params);
        // 삭제로 현재 페이지가 비면 앞 페이지로 되돌아감
        if (data.items.length === 0 && state.offset > 0) {
          state.offset = Math.max(0, state.offset - state.limit);
          return refresh();
        }
        state.total = data.total;
        $items.replaceChildren(...data.items.map(viewRow));
        $table.hidden = data.items.length === 0;
        $empty.hidden = data.items.length !== 0;
        renderPager(data.items.length);
        renderSortMarks();
        say('');
      } catch (e) {
        $table.hidden = true;
        $empty.hidden = true;
        say('목록을 불러오지 못했습니다: ' + e.message, 'error');
      }
    }

    document.querySelectorAll('th.sortable').forEach((th) => {
      th.onclick = () => {
        const col = th.dataset.sort;
        if (state.sort === col) {
          state.order = state.order === 'asc' ? 'desc' : 'asc';
        } else {
          state.sort = col;
          state.order = 'asc';
        }
        state.offset = 0;
        refresh();
      };
    });

    let searchTimer;
    $search.oninput = () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        state.q = $search.value.trim();
        state.offset = 0;
        refresh();
      }, 300); // 디바운스
    };

    $prev.onclick = () => { state.offset = Math.max(0, state.offset - state.limit); refresh(); };
    $next.onclick = () => { state.offset += state.limit; refresh(); };

    document.getElementById('add-form').onsubmit = async (ev) => {
      ev.preventDefault();
      const $name = document.getElementById('new-name');
      const name = $name.value.trim();
      if (!name) return;
      try {
        await api('/items', { method: 'POST', body: JSON.stringify({ name }) });
        $name.value = '';
        refresh();
      } catch (e) { say('추가 실패: ' + e.message, 'error'); }
    };
    document.getElementById('refresh').onclick = refresh;

    document.getElementById('login-form').onsubmit = async (ev) => {
      ev.preventDefault();
      const username = document.getElementById('login-user').value;
      const $pass = document.getElementById('login-pass');
      try {
        const res = await fetch(API + '/auth/login', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password: $pass.value }),
        });
        if (res.ok) {
          $loginMsg.textContent = '';
          $pass.value = '';
          showApp();
        } else {
          $loginMsg.textContent = '로그인 실패: 사용자명/비밀번호를 확인하세요';
        }
      } catch (e) {
        $loginMsg.textContent = 'BE 에 연결할 수 없습니다: ' + e.message;
      }
    };

    $logout.onclick = async () => {
      try {
        await fetch(API + '/auth/logout', { method: 'POST', credentials: 'include' });
      } catch (e) { /* 연결 실패여도 화면은 로그인으로 */ }
      showLogin();
    };

    // 초기 진입: 세션 유무로 화면 분기
    (async () => {
      try {
        const res = await fetch(API + '/auth/me', { credentials: 'include' });
        if (res.ok) showApp(); else showLogin();
      } catch (e) {
        showLogin();
        $loginMsg.textContent = 'BE 에 연결할 수 없습니다: ' + e.message;
      }
    })();
  </script>
</body>
</html>
